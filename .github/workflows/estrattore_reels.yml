name: Bot Fotografo - Estrattore Anteprime Reels

on:
  schedule:
    - cron: '*/30 * * * *' # Gira in automatico ogni 30 minuti
  workflow_dispatch: # Permette l'avvio manuale

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Configurazione Codice
      uses: actions/checkout@v4 # 👈 Aggiornato a v4 (risolve il warning)

    - name: Configurazione Python
      uses: actions/setup-python@v5 # 👈 Aggiornato a v5 (risolve il warning)
      with:
        python-version: '3.10'

    - name: Installazione Dipendenze Tecniche
      run: |
        pip install gspread google-auth google-api-python-client
        sudo apt-get update && sudo apt-get install -y ffmpeg

    - name: Esecuzione Script Fotografo
      env:
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python estrattore.py
